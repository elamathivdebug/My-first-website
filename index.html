<!DOCTYPE html>
<html>
<head>
    <title>My Aesthetic page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #f5f7fa, #c3cfe2);
            text-align: center;
        }

        h1 {
            margin-top: 30px;
            font-size: 40px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap:wrap;
            align-items:center;
        }

        .box {
            width: 250px;
            height: 300px;
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .box:hover {
            transform: scale(1.05);
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
            background-color:#f0f8ff;
        }

        .box img {
            width: 100%;
            height: 150px;
            border-radius: 10px;
            object-fit: cover;
        }

        .title {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }

        .desc {
            font-size: 14px;
            color: gray;
        }
         .navbar {
  display: flex;
  position:sticky;
  top:0;
  z-index:1000;
  justify-content: space-between;
  align-items: center;
  background-color: #333;
  padding: 10px 20px;
}

.logo {
  color: white;
}

.navbar ul {
  list-style: none;
  display: flex;
  gap: 20px;
}

.navbar ul li a {
  color: white;
  text-decoration: none;
  font-size: 16px;
}

.navbar ul li a:hover {
  color: #00ffff;
}

    </style>
</head>

<body>
     
 <div class="navbar">
    <h2 class="logo">MyWorld 🌍</h2>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Favorites</a></li>
        <li><a href="#">About</a></li>
    </ul>
    </div>

    <h1>✨ My Favorite World ✨</h1>

    <div class="container">

        <div class="box"onclick="alert('music is my favourite!')">
            <img src="image1.jpg">
            <div class="title">Music 🎵</div>
            <div class="desc">Music makes my mood better every day.</div>
        </div>

        <div class="box"onclick="alert('I love Coding 💻')">
            <img src="image2.jpg">
            <div class="title">Coding 💻</div>
            <div class="desc">I love building websites and learning new things.</div>
        </div>

        <div class="box"onclick="alert('Movies are fun 🎬')">
            <img src="image3.jpg">
            <div class="title">Movies 🎬</div>
            <div class="desc">Feel-good movies make me relaxed and happy.</div>
        </div>

        <div class="box"onclick="alert('Cricket is my favorite 🏏')">
            <img src="image4.jpg">
            <div class="title">Cricket 🏏</div>
            <div class="desc">I love to watch cricket and support RCB.</div>
        </div>

    </div>

</body>
</html>
