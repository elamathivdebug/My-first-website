<!DOCTYPE html>
<html>
<head>
    <title>My Aesthetic Page</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #dbeafe, #fce7f3);
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            margin-top: 30px;
        }

        .card {
            background: white;
            width: 260px;
            padding: 15px;
            margin: 15px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0px 6px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            vertical-align:top;
           
        }
        h3{
          font-weight:bold;
           }

        .card:hover {
            transform: scale(1.05);
            box-shadow:0px 10px 25px rgba(0,0,0.3);
        }

        img {
            width: 100%;
            height:180px;
            object-fit:contain;
            border-radius: 10px;
            display:block;
           aspect-ratio:1/1;
        }

        p {
            color: gray;
        }
    </style>
</head>

<body>

<h1>✨ My Favorite World ✨</h1>

<div class="container">

    <div class="card">
        <img src="https://wallpaperaccess.com/full/4763360.jpg">
        <h3>Music 🎵</h3>
        <p>Music makes my mood better every day.</p>
    </div>

    <div class="card">
        <img src="https://cdn.pixabay.com/photo/2024/05/20/13/28/ai-generated-8775232_1280.png">
        <h3>Coding 💻</h3>
        <p>I love building websites and learning new things.</p>
    </div>

    <div class="card">
        <img src="https://wallpapercave.com/wp/wp8217930.jpg">
        <h3>Movies 🎬</h3>
        <p>Feel-good movies make me relaxed and happy.</p>
    </div>
     
    <div class="card">
        <img src="ANI-RCB-Win-IPL-upl.jpg">
        <h3>cricket </h3>
        <p>i love to watch cricket and i support rcb.</p>
    </div>

    
</div>

</body>
</html>
